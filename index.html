<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enviar semana 2026-06-15</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#6b6b80;--accent:#7c6af7;--accent2:#e85d75;--green:#3ecf8e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;padding:1.5rem;max-width:640px;margin:0 auto}
h1{font-size:20px;font-weight:800;margin-bottom:4px}
.sub{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;font-size:12px;font-family:'IBM Plex Mono',monospace}
th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--border)}
th:first-child,td:first-child{text-align:left}
th{color:var(--muted);font-weight:500;text-transform:uppercase;font-size:10px;letter-spacing:.06em;background:var(--surface2)}
tr:last-child td{border-bottom:none}
.plat{font-size:9px;padding:1px 6px;border-radius:20px;background:rgba(225,48,108,0.15);color:#e1306c;margin-left:6px}
.plat.tiktok{background:rgba(255,59,92,0.15);color:#ff3b5c}
.btn{display:block;width:100%;margin-top:1.5rem;padding:14px;font-size:15px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer}
.btn:disabled{opacity:0.5;cursor:default}
.status{margin-top:1rem;font-size:13px;font-family:'IBM Plex Mono',monospace;text-align:center;min-height:18px}
.status.ok{color:var(--green)}
.status.err{color:var(--accent2)}
</style>
</head>
<body>
  <h1>Enviar dados — semana 2026-06-15</h1>
  <div class="sub">// confira os números e clique em enviar</div>
  <table>
    <thead><tr><th>Conta</th><th>Views</th><th>Interações</th><th>Seg. líq.</th><th>Conteúdos</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <button class="btn" id="sendBtn" onclick="enviar()">📤 Enviar para a planilha</button>
  <div class="status" id="status"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBMV39BFVa380UTCM_gT9mDtefq17xArdm2xnq8koRXTBj-U39uhq2DjqSVF6eRmjj/exec';

// [data, conta, dono, plataforma, views, interacoes, seguidores, conteudos]
const rows = [
  ['2026-06-15','@pavanato2026','Vinicius Pereira','Instagram',1200000,179258,3102,0],
  ['2026-06-15','@nikolas.pavanato','Julio Rodrigues','Instagram',150345,8569,299,0],
  ['2026-06-15','@pavanatobr2026','Julio Niglassi','Instagram',64687,4504,110,0],
  ['2026-06-15','@pavanatotramontina','Marcus Tramontina','Instagram',15032,1106,1349,0],
  ['2026-06-15','@jairbolsonaro0026','Leticia','Instagram',422725,51960,273,0],
  ['2026-06-15','@imparcialbra','Bianca','Instagram',5854,290,0,0],
  ['2026-06-15','@cutuquei','Kika','Instagram',103196,0,52,0],
  ['2026-06-15','@cortespavanato','Lorena','Instagram',39400,3920,98,0],
  ['2026-06-15','@pavanatotramontina','Vinicius Pereira','TikTok',0,0,0,0],
];

function fmt(n){ return Number(n).toLocaleString('pt-BR'); }

document.getElementById('tbody').innerHTML = rows.map(r=>{
  const plat = r[3]==='TikTok' ? '<span class="plat tiktok">TikTok</span>' : '<span class="plat">IG</span>';
  return `<tr>
    <td>${r[1]}${plat}</td>
    <td>${fmt(r[4])}</td>
    <td>${fmt(r[5])}</td>
    <td>${r[6]>=0?'+':''}${fmt(r[6])}</td>
    <td>${r[7]}</td>
  </tr>`;
}).join('');

async function enviar(){
  const btn = document.getElementById('sendBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.className = 'status';
  status.textContent = 'Enviando...';
  try{
    await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ sheet:'dados', rows })
    });
    status.className = 'status ok';
    status.textContent = '✓ Enviado! Pode fechar esta página e abrir o relatório.';
  }catch(e){
    status.className = 'status err';
    status.textContent = 'Erro ao enviar: ' + e.message;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
